# Reverse proxy that mimics how a host (Render/Railway/Fly/etc.) fronts the
# backend: terminates the client connection and forwards HTTP + WebSocket
# upgrades to the ASGI app. Used by docker-compose.proxy.yml to verify the WS
# path locally before deploying.
events {}

http {
  # Translate the Upgrade header into the Connection header for WS upgrades.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }
  }
}
