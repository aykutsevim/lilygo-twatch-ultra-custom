# Render Blueprint — deploys WatchTodo as ONE Docker web service (the SPA + REST
# + WebSocket in a single image). Redis is external (Upstash free tier). See
# DEPLOY.md for the step-by-step.
#
# One-time: Render -> "New +" -> "Blueprint" -> select this repo. Then set the two
# env vars marked `sync: false` in the dashboard (kept out of git).
services:
  - type: web
    name: watchtodo
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health      # public; pings Redis
    envVars:
      - key: REDIS_URL                 # Upstash rediss:// URL
        sync: false
      - key: API_KEY                   # long random shared key (watch + web)
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true            # Render generates a strong value
      - key: DEBUG
        value: "false"
      - key: WS_PING_INTERVAL
        value: "25"
      # ALLOWED_HOSTS auto-filled from RENDER_EXTERNAL_HOSTNAME (settings.py).
      # No CORS / VITE_* needed: the frontend is served same-origin by this app.
