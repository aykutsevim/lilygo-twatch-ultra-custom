# Render Blueprint — deploys the backend (Django ASGI: REST + WebSocket) as a
# Docker web service on the free tier. Redis is external (Upstash free tier);
# paste its URL into REDIS_URL. The frontend is deployed separately on Vercel
# (see DEPLOY.md §2b).
#
# One-time: in Render, "New +" -> "Blueprint" -> point at this repo. Then fill the
# env vars marked `sync: false` in the dashboard (intentionally not in git:
# secrets and cross-service URLs).

services:
  # ── Backend: Django ASGI (REST + WebSocket) in one container ──
  - type: web
    name: watchtodo-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health        # public, pings Redis
    envVars:
      - key: REDIS_URL                   # Upstash rediss:// URL
        sync: false
      - key: API_KEY                     # long random shared key
        sync: false
      - key: CORS_ALLOWED_ORIGINS        # the Vercel frontend origin
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true              # Render generates a strong value
      - key: DEBUG
        value: "false"
      - key: WS_PING_INTERVAL
        value: "25"
      # ALLOWED_HOSTS is auto-filled from RENDER_EXTERNAL_HOSTNAME (settings.py).
