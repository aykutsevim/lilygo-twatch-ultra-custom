# Pings the backend health endpoint on a schedule so the free-tier service does
# not cold-start on the watch's first request. Set repo variable HEALTH_URL to
# https://<backend>.onrender.com/api/health (Settings -> Secrets and variables ->
# Actions -> Variables). An external uptime pinger (e.g. UptimeRobot) works too.
name: keepalive

on:
  schedule:
    - cron: "*/12 * * * *" # every 12 minutes
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ vars.HEALTH_URL }}"
          if [ -z "$URL" ]; then
            echo "HEALTH_URL repo variable not set; skipping."
            exit 0
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
          echo "GET $URL -> $code"
          # Don't fail the workflow on a transient wake-up; just report.
