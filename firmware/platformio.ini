; WatchTodo firmware — LilyGo T-Watch Ultra (ESP32-S3).
; See ../specs/06-firmware.md. Start the device env from the official LilyGo
; T-Watch Ultra example platformio.ini (board id, partitions, PSRAM mode) and
; merge the lib_deps below.

[platformio]
default_envs = twatch-ultra

[env:twatch-ultra]
platform = espressif32
board = lilygo-t-watch-ultra        ; or the board id shipped by the LilyGo BSP
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
lib_deps =
    lvgl/lvgl @ ^8.4                ; match the version the BSP examples use
    bblanchon/ArduinoJson @ ^7
    links2004/WebSockets @ ^2.4     ; ESP32 WS client (tasks mode)
    mikalhart/TinyGPSPlus @ ^1.0    ; NMEA parsing (if a GPS source is present)
    ; + the official LilyGo T-Watch Ultra board support library
    ;   (add via git URL here, or vendor it in firmware/lib/)
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

; Native env: builds and runs the Arduino-free core logic tests on the host.
; No board/BSP required.  Run:  pio test -e native
[env:native]
platform = native
build_flags =
    -std=c++17
    -DWATCHTODO_NATIVE_TEST
test_framework = unity
; Only the Arduino-free core logic is compiled on the host; the device modules
; (Arduino/LVGL/BSP) are excluded.
build_src_filter = +<model/> +<app/>
