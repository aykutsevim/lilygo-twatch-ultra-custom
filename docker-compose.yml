services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  # Enabled in Phase 3 (frontend). Uncomment once frontend/Dockerfile exists.
  # frontend:
  #   build: ./frontend
  #   env_file: .env
  #   ports:
  #     - "5173:80"
  #   depends_on:
  #     - backend

volumes:
  redisdata:
